name: Deploy DocC to GitHub Pages

on:
  push:
    branches: [ main ]
  # Allow manual re-runs from the Actions tab
  workflow_dispatch:

# Grant Pages write permission
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Emit symbol graphs
        run: |
          mkdir -p /tmp/flex-symbols
          swift build --target FlexLayout \
            -Xswiftc -emit-symbol-graph \
            -Xswiftc -emit-symbol-graph-dir \
            -Xswiftc /tmp/flex-symbols

      - name: Build static DocC site
        run: |
          xcrun docc convert Sources/FlexLayout/FlexLayout.docc \
            --transform-for-static-hosting \
            --hosting-base-path flex-layout \
            --additional-symbol-graph-dir /tmp/flex-symbols \
            --output-path /tmp/FlexLayoutDocs

      - name: Add root redirect and 404 fallback
        run: |
          # Redirect root → documentation landing page
          cat > /tmp/FlexLayoutDocs/index.html << 'REDIRECT'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=/flex-layout/documentation/flexlayout">
              <title>FlexLayout – redirecting…</title>
            </head>
            <body>
              <p>Redirecting to <a href="/flex-layout/documentation/flexlayout">documentation</a>…</p>
              <script>window.location.replace("/flex-layout/documentation/flexlayout")</script>
            </body>
          </html>
          REDIRECT
          # 404 fallback — lets the DocC SPA handle deep links
          cp /tmp/FlexLayoutDocs/documentation/flexlayout/index.html /tmp/FlexLayoutDocs/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/FlexLayoutDocs
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "docs: deploy DocC API reference [skip ci]"
