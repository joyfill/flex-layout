name: Record snapshot baselines

# Manual-trigger workflow that re-records every committed snapshot
# baseline on a GitHub-hosted macOS runner, then commits the diff
# back to the source branch.
#
# Note: the first time this file lands on the default branch, GitHub
# sometimes mis-parses it and dispatch returns 422 "Workflow does
# not have 'workflow_dispatch' trigger". A subsequent push that
# modifies the file forces a re-parse. If you see that 422 error,
# touch this file with any change (even a comment) and push.
#
# Why this exists: snapshot baselines recorded on local developer
# Macs produce subtly different pixels (antialiasing, font subpixel
# rendering, Display-P3 vs sRGB) than GitHub-hosted runners. When the
# CI environment's rendering drifts past `assertJoyDOMSnapshot`'s
# precision tolerance (currently 0.85/0.85), every snapshot test
# starts failing. Re-recording on CI itself realigns the baselines
# to the verification environment.
#
# Usage: Actions → "Record snapshot baselines" → "Run workflow",
# pick the branch you want to record against. The workflow records,
# commits `__Snapshots__/` changes back to that branch with a clear
# commit message, and pushes. Open a PR (or merge directly if it's
# your feature branch) to inspect the diff before it lands on `main`.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to record against (defaults to the branch this workflow ran on)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  record:
    name: Record on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Record on the newer matrix entry (Swift 6.0 / macos-15).
        # If we ever need separate baselines per macOS version, fan
        # this out and partition snapshot dirs per-runner.
        include:
          - os: macos-15
            swift: "6.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Swift version
        run: swift --version

      # The snapshot helper looks for SNAPSHOT_TESTING_RECORD in the
      # process env. When set, missing baselines are written and
      # existing ones are overwritten with the freshly-rendered image.
      - name: Re-record baselines
        env:
          SNAPSHOT_TESTING_RECORD: "1"
        run: |
          set +e   # snapshot tests "fail" by design on first record
          swift test
          echo "Recording pass complete (exit code ignored — first-record failures are expected)"

      - name: Inspect diff
        run: |
          git status --short
          git diff --stat

      - name: Commit baseline changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only stage files under __Snapshots__ to keep this workflow
          # tightly scoped — code/JSON changes aren't allowed via this
          # path.
          git add 'Tests/**/__Snapshots__/**' || true
          if git diff --cached --quiet; then
            echo "No baseline drift — nothing to commit."
            exit 0
          fi
          git commit -m "chore(snapshot): re-record baselines on ${{ matrix.os }} (Swift ${{ matrix.swift }})

Auto-generated by .github/workflows/record-baselines.yml.

Trigger: workflow_dispatch
Source branch: ${{ inputs.branch || github.ref_name }}
Runner: ${{ matrix.os }} / Swift ${{ matrix.swift }}

Co-Authored-By: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          git push origin HEAD:${{ inputs.branch || github.ref_name }}
