name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Single-runner CI: macos-15 / Swift 6.0. We previously matrixed
  # against macos-14 / Swift 5.9 as well, but it doubled the runtime
  # without catching anything the newer pair didn't. If we need to
  # widen the matrix again (e.g. when Apple ships macos-26), this is
  # the spot.
  test:
    name: Swift 6.0 on macos-15
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build --target FlexLayout

      # Snapshot tests run LOCALLY ONLY. The CI runner's rendering
      # differs from developer Macs by enough pixel area that no
      # tolerance threshold can reliably bridge both environments —
      # we tried 0.99 → 0.85 → 0.20 and even at 0.20 the local-vs-CI
      # diff broke baselines. Rather than maintain two sets of
      # baselines or accept brittle precision tolerances, snapshot
      # tests are mandatory on every local `swift test` (the dev
      # environment that authored the property's samples) and skipped
      # on CI.
      #
      # If snapshot drift on CI ever needs validating (e.g. spec
      # change), trigger `.github/workflows/record-baselines.yml`
      # to re-record on the CI runner — that produces a snapshot
      # diff PR for visual review.
      - name: Test
        run: swift test --parallel --skip FlexboxSnapshotTests --skip JoyDOMSnapshotBaselineTests --skip SizingSnapshotTests --skip BoxModelSnapshotTests --skip LayoutSnapshotTests --skip TypographySnapshotTests

      - name: Build release
        run: swift build -c release --target FlexLayout
